
[env]
TERM = "xterm-256color"

[window]
padding.x = 5
padding.y = 5
opacity = 0.9
blur = true
dimensions = { columns = 150, lines = 53 }
decorations = "Buttonless"
option_as_alt = "Both"

[font]
size = 16
[font.normal]

# family = "MesloLGS NF"
family = "JetBrainsMono Nerd Font"

[general]
live_config_reload = true
import = ["~/.config/alacritty/gruvbox_material_hard_dark.toml"]

[selection]
save_to_clipboard = true

[keyboard]
bindings = [
    { key = "Left", mods = "Command", chars = "\u0001" },   # Move to the beginning of line
    { key = "Right", mods = "Command", chars = "\u0005" },  # Move to the end of line
    { key = "Left", mods = "Alt", chars = "\u001BB" },      # Go forward a word
    { key = "Right", mods = "Alt", chars = "\u001BF" },     # Go backward a word
    { key = "Back", mods = "Command", chars = "\u0015" },   # Delete line
    { key = "Back", mods = "Alt", chars = "\u001b\u007f" }, # Delete word
]
