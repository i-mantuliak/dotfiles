unbind r

bind r source-file ~/.config/tmux/tmux.conf
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind C-a send-prefix

set -g prefix C-a
set -g mouse on                          # enable mouse support
set -g base-index 1                      # start window numbering at 1
set -g pane-base-index 1                 # start pane numbering at 1
set -g default-terminal "${TERM}"        # use terminal from environment
set -g history-limit 50000               # increase scrollback history
set -g renumber-windows on               # renumber windows after close
set -g display-time 4000                 # message display time (ms)
set -g set-titles on                     # enable terminal window titles
set -g set-titles-string "#{pane_title}" # set title to current pane title

set -s escape-time 0                     # remove Escape key delay

set -g status-style bg=default           # use default terminal background
set -g status-justify centre
set -g status-left "[#S]"
set -g status-right "Hostname: #h"
